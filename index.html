<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Prompts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --border: #222;
  --text: #e8e8e8;
  --text-dim: #666;
  --accent: #ff6b35;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --display: 'Archivo Black', sans-serif;
}

html { background: var(--bg); }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* --- NAV --- */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 24px;
  pointer-events: none;
}
nav > * { pointer-events: auto; }

.logo {
  font-family: var(--display);
  font-size: 16px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text);
  text-decoration: none;
  user-select: none;
}
.logo span { color: var(--accent); }

.nav-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1.5px solid #333;
  background: rgba(10,10,10,0.8);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.2s, background 0.2s;
}
.nav-btn:hover { border-color: #555; background: rgba(30,30,30,0.9); }
.nav-btn svg { width: 16px; height: 16px; }

/* --- FOOTER BAR --- */
.footer-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 24px;
  pointer-events: none;
}
.footer-bar > * { pointer-events: auto; }

.counter {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text-dim);
  user-select: none;
}

.view-toggle {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1.5px solid #333;
  background: rgba(10,10,10,0.8);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.2s, background 0.2s;
}
.view-toggle:hover { border-color: #555; }
.view-toggle svg { width: 18px; height: 18px; }

/* --- GRID VIEW --- */
.gallery {
  padding: 80px 8px 100px;
  transition: opacity 0.3s;
}

.gallery.grid-view {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
}

.gallery.list-view {
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 600px;
  margin: 0 auto;
  padding-left: 16px;
  padding-right: 16px;
}

/* --- CARD --- */
.card {
  position: relative;
  cursor: pointer;
  overflow: hidden;
  background: var(--surface);
}

.grid-view .card {
  aspect-ratio: 1;
}

.list-view .card {
  border-radius: 0;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s ease;
}

.card:hover img {
  transform: scale(1.03);
}

/* Card overlay on hover (grid only) */
.grid-view .card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.grid-view .card:hover::after { opacity: 1; }

.card-title {
  position: absolute;
  bottom: 12px; left: 12px; right: 12px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  color: #fff;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.3s, transform 0.3s;
  z-index: 2;
  pointer-events: none;
}
.grid-view .card:hover .card-title {
  opacity: 1;
  transform: translateY(0);
}

/* List view card extras */
.list-view .card-title {
  position: static;
  opacity: 1;
  transform: none;
  padding: 16px 0 4px;
  font-size: 15px;
}
.list-view .card::after { display: none; }

.card-model {
  display: none;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  padding: 0 0 12px;
}
.list-view .card-model { display: block; }

/* --- MODAL --- */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.modal-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.modal {
  width: 90%;
  max-width: 560px;
  max-height: 85vh;
  overflow-y: auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  transform: translateY(20px) scale(0.97);
  transition: transform 0.3s;
}
.modal-overlay.active .modal {
  transform: translateY(0) scale(1);
}

.modal-image {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  display: block;
}

.modal-body { padding: 20px; }

.modal-title {
  font-family: var(--sans);
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 4px;
}

.modal-model {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 16px;
}

.modal-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.tag {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  border: 1px solid rgba(255,107,53,0.3);
  padding: 3px 8px;
  border-radius: 4px;
  user-select: none;
}

.json-block {
  position: relative;
  background: #0d0d0d;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  overflow-x: auto;
}

.json-block pre {
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.6;
  color: #ccc;
  white-space: pre-wrap;
  word-break: break-word;
}

.copy-btn {
  position: absolute;
  top: 8px; right: 8px;
  font-family: var(--mono);
  font-size: 11px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 4px;
  padding: 5px 12px;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}
.copy-btn:hover { background: #e55a28; }
.copy-btn:active { transform: scale(0.95); }
.copy-btn.copied { background: #2a9d4a; }

.modal-source {
  display: inline-block;
  margin-top: 12px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  text-decoration: none;
  border-bottom: 1px solid #333;
  transition: color 0.2s;
}
.modal-source:hover { color: var(--text); }

.modal-close {
  position: sticky;
  top: 12px;
  float: right;
  margin: 12px 12px 0 0;
  width: 32px; height: 32px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,0.6);
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  font-size: 18px;
  line-height: 1;
  transition: background 0.2s;
}
.modal-close:hover { background: rgba(0,0,0,0.9); }

/* --- ABOUT PANEL --- */
.about-overlay {
  position: fixed;
  inset: 0;
  z-index: 300;
  background: rgba(0,0,0,0.9);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.about-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.about-content {
  max-width: 480px;
  padding: 40px 24px;
  text-align: center;
}

.about-title {
  font-family: var(--display);
  font-size: 28px;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}
.about-title span { color: var(--accent); }

.about-tagline {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 32px;
  line-height: 1.6;
}

.about-text {
  font-size: 14px;
  line-height: 1.8;
  color: #999;
  margin-bottom: 24px;
}

.about-close {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
  background: none;
  border: 1px solid #333;
  border-radius: 20px;
  padding: 8px 24px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.about-close:hover { border-color: #555; color: var(--text); }

/* --- PLACEHOLDER (empty state) --- */
.placeholder-card {
  aspect-ratio: 1;
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
}
.placeholder-card span {
  font-family: var(--mono);
  font-size: 11px;
  color: #333;
}

/* --- RESPONSIVE --- */
@media (max-width: 480px) {
  .gallery.grid-view {
    grid-template-columns: repeat(2, 1fr);
  }
  .gallery.list-view {
    padding-left: 12px;
    padding-right: 12px;
  }
}

@media (min-width: 768px) {
  .gallery.grid-view {
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    padding: 80px 4px 100px;
  }
  .gallery.list-view {
    max-width: 640px;
  }
}

@media (min-width: 1200px) {
  .gallery.grid-view {
    grid-template-columns: repeat(5, 1fr);
  }
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="#" class="logo" id="homeBtn"><span>JSON</span> Prompts</a>
  <button class="nav-btn" id="aboutBtn" aria-label="About">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".5" fill="currentColor"/>
    </svg>
  </button>
</nav>

<!-- GALLERY -->
<div class="gallery grid-view" id="gallery"></div>

<!-- FOOTER -->
<div class="footer-bar">
  <div class="counter" id="counter"></div>
  <button class="view-toggle" id="viewToggle" aria-label="Toggle view">
    <!-- List icon (shown when in grid mode) -->
    <svg id="listIcon" viewBox="0 0 24 24" fill="currentColor">
      <rect x="3" y="4" width="18" height="4" rx="1"/>
      <rect x="3" y="10" width="18" height="4" rx="1"/>
      <rect x="3" y="16" width="18" height="4" rx="1"/>
    </svg>
    <!-- Grid icon (shown when in list mode) -->
    <svg id="gridIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
  </button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">×</button>
    <img class="modal-image" id="modalImage" src="" alt="">
    <div class="modal-body">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-model" id="modalModel"></div>
      <div class="modal-tags" id="modalTags"></div>
      <div class="json-block">
        <button class="copy-btn" id="copyBtn">COPY</button>
        <pre id="modalJson"></pre>
      </div>
      <a class="modal-source" id="modalSource" href="#" target="_blank" rel="noopener">Source ↗</a>
    </div>
  </div>
</div>

<!-- ABOUT -->
<div class="about-overlay" id="aboutOverlay">
  <div class="about-content">
    <div class="about-title"><span>JSON</span> Prompts</div>
    <div class="about-tagline">Curated image generation prompts you can steal.</div>
    <p class="about-text">
      A collection of vivid, precise prompts that produce remarkable images.
      Browse the gallery, find one you like, copy the JSON, and make it yours.
    </p>
    <button class="about-close" id="aboutClose">Close</button>
  </div>
</div>

<script>
let prompts = [];
let isGrid = true;

const gallery = document.getElementById('gallery');
const counter = document.getElementById('counter');
const viewToggle = document.getElementById('viewToggle');
const listIcon = document.getElementById('listIcon');
const gridIcon = document.getElementById('gridIcon');
const modalOverlay = document.getElementById('modalOverlay');
const aboutOverlay = document.getElementById('aboutOverlay');

// Load data
fetch('prompts.json')
  .then(r => r.json())
  .then(data => {
    prompts = data;
    render();
  });

function render() {
  gallery.innerHTML = '';
  gallery.className = isGrid ? 'gallery grid-view' : 'gallery list-view';
  listIcon.style.display = isGrid ? 'block' : 'none';
  gridIcon.style.display = isGrid ? 'none' : 'block';

  // For grid: repeat items to fill screen and create infinite feel
  const items = isGrid ? repeatToFill(prompts) : prompts;

  items.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img src="${p.image}" alt="${p.title}" loading="lazy">
      <div class="card-title">${p.title}</div>
      ${!isGrid ? `<div class="card-model">${p.model}</div>` : ''}
    `;
    card.addEventListener('click', () => openModal(p));
    gallery.appendChild(card);
  });

  counter.textContent = `${prompts.length} prompt${prompts.length !== 1 ? 's' : ''}`;
}

function repeatToFill(items) {
  if (items.length === 0) return [];
  // Aim for enough cards to fill viewport generously
  const minCards = 40;
  const repeated = [];
  while (repeated.length < minCards) {
    // Shuffle each batch for variety
    const shuffled = [...items].sort(() => Math.random() - 0.5);
    repeated.push(...shuffled);
  }
  return repeated;
}

// View toggle
viewToggle.addEventListener('click', () => {
  isGrid = !isGrid;
  render();
  window.scrollTo({ top: 0, behavior: 'instant' });
});

// Modal
function openModal(p) {
  document.getElementById('modalImage').src = p.image;
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalModel').textContent = p.model;

  const tagsEl = document.getElementById('modalTags');
  tagsEl.innerHTML = (p.tags || []).map(t => `<span class="tag">${t}</span>`).join('');

  const jsonStr = JSON.stringify(p.prompt, null, 2);
  document.getElementById('modalJson').textContent = jsonStr;

  const sourceEl = document.getElementById('modalSource');
  if (p.source) {
    sourceEl.href = p.source;
    sourceEl.style.display = 'inline-block';
  } else {
    sourceEl.style.display = 'none';
  }

  const copyBtn = document.getElementById('copyBtn');
  copyBtn.textContent = 'COPY';
  copyBtn.classList.remove('copied');

  modalOverlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  modalOverlay.classList.remove('active');
  document.body.style.overflow = '';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) closeModal();
});

// Copy
document.getElementById('copyBtn').addEventListener('click', () => {
  const json = document.getElementById('modalJson').textContent;
  navigator.clipboard.writeText(json).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'COPIED';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'COPY';
      btn.classList.remove('copied');
    }, 2000);
  });
});

// About
document.getElementById('aboutBtn').addEventListener('click', () => {
  aboutOverlay.classList.add('active');
});
document.getElementById('aboutClose').addEventListener('click', () => {
  aboutOverlay.classList.remove('active');
});
aboutOverlay.addEventListener('click', (e) => {
  if (e.target === aboutOverlay) aboutOverlay.classList.remove('active');
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeModal();
    aboutOverlay.classList.remove('active');
  }
});

// Home
document.getElementById('homeBtn').addEventListener('click', (e) => {
  e.preventDefault();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
</script>
</body>
</html>
