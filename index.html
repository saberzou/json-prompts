<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Prompts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #000;
  --surface: #111;
  --border: #222;
  --text: #e8e8e8;
  --text-dim: #555;
  --accent: #ff6b35;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --display: 'Archivo Black', sans-serif;
  --gap: 1px;
}

html, body {
  background: var(--bg);
  font-family: var(--sans);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ========== NAV ========== */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 24px;
  pointer-events: none;
}
nav > * { pointer-events: auto; }

.logo {
  font-family: var(--display);
  font-size: 14px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text);
  text-decoration: none;
  user-select: none;
}
.logo span { color: var(--accent); }

.nav-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1.5px solid #333;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--text);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s;
}
.nav-btn:hover { border-color: #666; }
.nav-btn svg { width: 16px; height: 16px; }

/* ========== FOOTER BAR ========== */
.footer-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 24px;
  pointer-events: none;
}
.footer-bar > * { pointer-events: auto; }

.counter {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text-dim);
  user-select: none;
}

.view-toggle {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1.5px solid #333;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--text);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s;
}
.view-toggle:hover { border-color: #666; }
.view-toggle svg { width: 18px; height: 18px; }

/* ========== GRID VIEW — irregular mosaic ========== */
#gridView {
  padding: 0;
  display: grid;
  gap: var(--gap);
  /* 6-column base grid for varied tile sizes */
  grid-template-columns: repeat(6, 1fr);
  grid-auto-rows: minmax(100px, auto);
  grid-auto-flow: dense;
}

.grid-cell {
  position: relative;
  overflow: hidden;
  background: var(--surface);
  cursor: pointer;
}

/* Tile size classes — assigned in JS based on pattern */
.grid-cell.sz-1x1 { grid-column: span 2; grid-row: span 2; }
.grid-cell.sz-2x1 { grid-column: span 4; grid-row: span 2; }
.grid-cell.sz-1x2 { grid-column: span 2; grid-row: span 4; }
.grid-cell.sz-2x2 { grid-column: span 3; grid-row: span 3; }
.grid-cell.sz-wide { grid-column: span 6; grid-row: span 2; }

.grid-cell img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.5s cubic-bezier(0.25, 0, 0.25, 1);
}
.grid-cell:hover img { transform: scale(1.04); }

/* Hover overlay */
.grid-cell::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 40%);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.grid-cell:hover::after { opacity: 1; }

.grid-cell .cell-title {
  position: absolute;
  bottom: 12px; left: 14px; right: 14px;
  font-size: 13px; font-weight: 500;
  color: #fff;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.3s, transform 0.3s;
  z-index: 2;
  pointer-events: none;
}
.grid-cell:hover .cell-title {
  opacity: 1; transform: translateY(0);
}

/* ========== LIST VIEW — stacked carousel ========== */
#listView {
  display: none;
  position: fixed;
  inset: 0;
  overflow: hidden;
  perspective: 800px;
}

.list-track {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: transform 0.5s cubic-bezier(0.25, 0, 0.25, 1);
  will-change: transform;
}

.list-item {
  position: absolute;
  width: 55vw;
  max-width: 480px;
  aspect-ratio: 1;
  border-radius: 0;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.5s cubic-bezier(0.25, 0, 0.25, 1),
              opacity 0.5s cubic-bezier(0.25, 0, 0.25, 1);
  will-change: transform, opacity;
  background: var(--surface);
}

.list-item img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

.list-item .list-title {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 16px;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
  font-size: 15px; font-weight: 500;
  color: #fff;
  opacity: 0;
  transition: opacity 0.3s;
}
.list-item.active .list-title { opacity: 1; }

.list-item .list-model {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 0 16px 12px;
  font-family: var(--mono);
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  opacity: 0;
  transition: opacity 0.3s;
}
.list-item.active .list-model { opacity: 1; }

/* ========== MODAL ========== */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.88);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }

.modal {
  width: 90%; max-width: 540px; max-height: 85vh;
  overflow-y: auto;
  background: #0a0a0a;
  border: 1px solid #1a1a1a;
  border-radius: 12px;
  transform: translateY(20px) scale(0.97);
  transition: transform 0.3s;
}
.modal-overlay.active .modal { transform: translateY(0) scale(1); }

.modal-image {
  width: 100%; aspect-ratio: 1;
  object-fit: cover; display: block;
}

.modal-body { padding: 20px; }

.modal-title {
  font-size: 18px; font-weight: 700;
  margin-bottom: 4px;
}

.modal-model {
  font-family: var(--mono); font-size: 12px;
  color: var(--text-dim); margin-bottom: 16px;
}

.modal-tags {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px;
}
.tag {
  font-family: var(--mono); font-size: 11px;
  color: var(--accent);
  border: 1px solid rgba(255,107,53,0.25);
  padding: 3px 8px; border-radius: 4px;
  user-select: none;
}

.json-block {
  position: relative;
  background: #050505;
  border: 1px solid #1a1a1a;
  border-radius: 8px;
  padding: 16px;
  overflow-x: auto;
}
.json-block pre {
  font-family: var(--mono); font-size: 12px;
  line-height: 1.6; color: #aaa;
  white-space: pre-wrap; word-break: break-word;
}

.copy-btn {
  position: absolute; top: 8px; right: 8px;
  font-family: var(--mono); font-size: 11px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 4px;
  padding: 5px 12px; cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}
.copy-btn:hover { background: #e55a28; }
.copy-btn:active { transform: scale(0.95); }
.copy-btn.copied { background: #2a9d4a; }

.modal-source {
  display: inline-block; margin-top: 12px;
  font-family: var(--mono); font-size: 11px;
  color: var(--text-dim); text-decoration: none;
  border-bottom: 1px solid #222;
  transition: color 0.2s;
}
.modal-source:hover { color: var(--text); }

.modal-close {
  position: sticky; top: 12px; float: right;
  margin: 12px 12px 0 0;
  width: 32px; height: 32px;
  border-radius: 50%; border: none;
  background: rgba(255,255,255,0.1);
  color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 10; font-size: 18px; line-height: 1;
  transition: background 0.2s;
}
.modal-close:hover { background: rgba(255,255,255,0.2); }

/* ========== ABOUT ========== */
.about-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.92);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.about-overlay.active { opacity: 1; pointer-events: auto; }

.about-content {
  max-width: 440px; padding: 40px 24px; text-align: center;
}
.about-title {
  font-family: var(--display); font-size: 28px;
  letter-spacing: 0.05em; margin-bottom: 8px;
}
.about-title span { color: var(--accent); }
.about-tagline {
  font-size: 14px; color: var(--text-dim);
  margin-bottom: 32px; line-height: 1.6;
}
.about-text {
  font-size: 14px; line-height: 1.8; color: #777; margin-bottom: 24px;
}
.about-close {
  font-family: var(--mono); font-size: 12px;
  color: var(--text-dim); background: none;
  border: 1px solid #333; border-radius: 20px;
  padding: 8px 24px; cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.about-close:hover { border-color: #555; color: var(--text); }

/* ========== RESPONSIVE ========== */
@media (max-width: 480px) {
  #gridView { grid-template-columns: repeat(4, 1fr); }
  .grid-cell.sz-1x1 { grid-column: span 2; grid-row: span 2; }
  .grid-cell.sz-2x1 { grid-column: span 4; grid-row: span 2; }
  .grid-cell.sz-1x2 { grid-column: span 2; grid-row: span 3; }
  .grid-cell.sz-2x2 { grid-column: span 2; grid-row: span 2; }
  .grid-cell.sz-wide { grid-column: span 4; grid-row: span 2; }
  .list-item { width: 75vw; }
}

@media (min-width: 1200px) {
  #gridView { grid-template-columns: repeat(8, 1fr); }
  .grid-cell.sz-2x1 { grid-column: span 4; }
  .grid-cell.sz-wide { grid-column: span 8; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="#" class="logo" id="homeBtn"><span>JSON</span> Prompts</a>
  <button class="nav-btn" id="aboutBtn" aria-label="About">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".5" fill="currentColor"/>
    </svg>
  </button>
</nav>

<!-- GRID VIEW -->
<div id="gridView"></div>

<!-- LIST VIEW -->
<div id="listView">
  <div class="list-track" id="listTrack"></div>
</div>

<!-- FOOTER -->
<div class="footer-bar">
  <div class="counter" id="counter"></div>
  <button class="view-toggle" id="viewToggle" aria-label="Toggle view">
    <svg id="listIcon" viewBox="0 0 24 24" fill="currentColor">
      <rect x="3" y="4" width="18" height="4" rx="1"/>
      <rect x="3" y="10" width="18" height="4" rx="1"/>
      <rect x="3" y="16" width="18" height="4" rx="1"/>
    </svg>
    <svg id="gridIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
  </button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">×</button>
    <img class="modal-image" id="modalImage" src="" alt="">
    <div class="modal-body">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-model" id="modalModel"></div>
      <div class="modal-tags" id="modalTags"></div>
      <div class="json-block">
        <button class="copy-btn" id="copyBtn">COPY</button>
        <pre id="modalJson"></pre>
      </div>
      <a class="modal-source" id="modalSource" href="#" target="_blank" rel="noopener">Source ↗</a>
    </div>
  </div>
</div>

<!-- ABOUT -->
<div class="about-overlay" id="aboutOverlay">
  <div class="about-content">
    <div class="about-title"><span>JSON</span> Prompts</div>
    <div class="about-tagline">Curated image generation prompts you can steal.</div>
    <p class="about-text">
      A collection of vivid, precise prompts that produce remarkable images.
      Browse the gallery, find one you like, copy the JSON, and make it yours.
    </p>
    <button class="about-close" id="aboutClose">Close</button>
  </div>
</div>

<script>
let prompts = [];
let isGrid = true;
let listIndex = 0;

const gridView = document.getElementById('gridView');
const listView = document.getElementById('listView');
const listTrack = document.getElementById('listTrack');
const counter = document.getElementById('counter');
const listIcon = document.getElementById('listIcon');
const gridIcon = document.getElementById('gridIcon');
const modalOverlay = document.getElementById('modalOverlay');
const aboutOverlay = document.getElementById('aboutOverlay');

// Tile size patterns — repeating sequence for visual variety
const sizePatterns = [
  'sz-1x1', 'sz-2x2', 'sz-1x1',
  'sz-2x1',
  'sz-1x1', 'sz-1x2', 'sz-1x1',
  'sz-1x1', 'sz-1x1', 'sz-2x1',
  'sz-wide',
  'sz-1x1', 'sz-1x1', 'sz-2x2',
  'sz-1x1', 'sz-1x1',
  'sz-1x2', 'sz-1x1', 'sz-1x1',
];

fetch('prompts.json')
  .then(r => r.json())
  .then(data => { prompts = data; renderGrid(); });

/* ========== GRID ========== */
function renderGrid() {
  gridView.innerHTML = '';
  // Repeat prompts to fill an infinite-feeling canvas
  const tiles = repeatShuffle(prompts, 60);

  tiles.forEach((p, i) => {
    const cell = document.createElement('div');
    cell.className = 'grid-cell ' + sizePatterns[i % sizePatterns.length];
    cell.innerHTML = `
      <img src="${p.image}" alt="${p.title}" loading="lazy">
      <span class="cell-title">${p.title}</span>
    `;
    cell.addEventListener('click', () => openModal(p));
    gridView.appendChild(cell);
  });

  counter.textContent = `${prompts.length} prompt${prompts.length !== 1 ? 's' : ''}`;
}

function repeatShuffle(items, min) {
  if (!items.length) return [];
  const result = [];
  while (result.length < min) {
    const batch = [...items].sort(() => Math.random() - 0.5);
    result.push(...batch);
  }
  return result;
}

/* ========== LIST (stacked carousel) ========== */
function renderList() {
  listTrack.innerHTML = '';
  listIndex = 0;

  prompts.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'list-item';
    item.innerHTML = `
      <img src="${p.image}" alt="${p.title}">
      <div class="list-title">${p.title}</div>
      <div class="list-model">${p.model}</div>
    `;
    item.addEventListener('click', () => openModal(p));
    listTrack.appendChild(item);
  });

  positionListItems();
  counter.textContent = `${listIndex + 1} / ${prompts.length}`;
}

function positionListItems() {
  const items = listTrack.querySelectorAll('.list-item');
  const vh = window.innerHeight;

  items.forEach((item, i) => {
    const offset = i - listIndex;
    item.classList.toggle('active', offset === 0);

    if (offset === 0) {
      // Center — large
      item.style.transform = 'translateY(0) scale(1)';
      item.style.opacity = '1';
      item.style.zIndex = '10';
    } else if (offset === -1) {
      // Above — smaller, pushed up
      item.style.transform = `translateY(${-vh * 0.38}px) scale(0.55)`;
      item.style.opacity = '0.5';
      item.style.zIndex = '5';
    } else if (offset === 1) {
      // Below — smaller, pushed down
      item.style.transform = `translateY(${vh * 0.38}px) scale(0.55)`;
      item.style.opacity = '0.5';
      item.style.zIndex = '5';
    } else if (offset === -2) {
      item.style.transform = `translateY(${-vh * 0.6}px) scale(0.35)`;
      item.style.opacity = '0.2';
      item.style.zIndex = '2';
    } else if (offset === 2) {
      item.style.transform = `translateY(${vh * 0.6}px) scale(0.35)`;
      item.style.opacity = '0.2';
      item.style.zIndex = '2';
    } else {
      item.style.transform = `translateY(${offset * vh * 0.5}px) scale(0.2)`;
      item.style.opacity = '0';
      item.style.zIndex = '0';
    }
  });

  counter.textContent = `${listIndex + 1} / ${prompts.length}`;
}

// Scroll / swipe handling for list view
let listTouchStartY = 0;
let listScrollLocked = false;

function listNavigate(direction) {
  if (listScrollLocked) return;
  const next = listIndex + direction;
  if (next < 0 || next >= prompts.length) return;

  listScrollLocked = true;
  listIndex = next;
  positionListItems();
  setTimeout(() => { listScrollLocked = false; }, 500);
}

// Mouse wheel
window.addEventListener('wheel', (e) => {
  if (isGrid || modalOverlay.classList.contains('active')) return;
  e.preventDefault();
  listNavigate(e.deltaY > 0 ? 1 : -1);
}, { passive: false });

// Touch swipe
window.addEventListener('touchstart', (e) => {
  if (isGrid) return;
  listTouchStartY = e.touches[0].clientY;
}, { passive: true });

window.addEventListener('touchend', (e) => {
  if (isGrid) return;
  const dy = listTouchStartY - e.changedTouches[0].clientY;
  if (Math.abs(dy) > 40) {
    listNavigate(dy > 0 ? 1 : -1);
  }
});

// Arrow keys
window.addEventListener('keydown', (e) => {
  if (isGrid || modalOverlay.classList.contains('active')) return;
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') listNavigate(1);
  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') listNavigate(-1);
});

// Resize
window.addEventListener('resize', () => {
  if (!isGrid) positionListItems();
});

/* ========== VIEW TOGGLE ========== */
document.getElementById('viewToggle').addEventListener('click', () => {
  isGrid = !isGrid;
  listIcon.style.display = isGrid ? 'block' : 'none';
  gridIcon.style.display = isGrid ? 'none' : 'block';

  if (isGrid) {
    gridView.style.display = '';
    listView.style.display = 'none';
    document.body.style.overflow = '';
  } else {
    gridView.style.display = 'none';
    listView.style.display = 'block';
    document.body.style.overflow = 'hidden';
    renderList();
  }
});

/* ========== MODAL ========== */
function openModal(p) {
  document.getElementById('modalImage').src = p.image;
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalModel').textContent = p.model;

  const tagsEl = document.getElementById('modalTags');
  tagsEl.innerHTML = (p.tags || []).map(t => `<span class="tag">${t}</span>`).join('');

  document.getElementById('modalJson').textContent = JSON.stringify(p.prompt, null, 2);

  const sourceEl = document.getElementById('modalSource');
  sourceEl.style.display = p.source ? 'inline-block' : 'none';
  if (p.source) sourceEl.href = p.source;

  const copyBtn = document.getElementById('copyBtn');
  copyBtn.textContent = 'COPY';
  copyBtn.classList.remove('copied');

  modalOverlay.classList.add('active');
}

function closeModal() {
  modalOverlay.classList.remove('active');
}

document.getElementById('modalClose').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) closeModal();
});

document.getElementById('copyBtn').addEventListener('click', () => {
  const json = document.getElementById('modalJson').textContent;
  navigator.clipboard.writeText(json).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'COPIED';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 2000);
  });
});

/* ========== ABOUT ========== */
document.getElementById('aboutBtn').addEventListener('click', () => {
  aboutOverlay.classList.add('active');
});
document.getElementById('aboutClose').addEventListener('click', () => {
  aboutOverlay.classList.remove('active');
});
aboutOverlay.addEventListener('click', (e) => {
  if (e.target === aboutOverlay) aboutOverlay.classList.remove('active');
});

/* ========== KEYBOARD ========== */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeModal();
    aboutOverlay.classList.remove('active');
  }
});

/* ========== HOME ========== */
document.getElementById('homeBtn').addEventListener('click', (e) => {
  e.preventDefault();
  if (isGrid) window.scrollTo({ top: 0, behavior: 'smooth' });
  else { listIndex = 0; positionListItems(); }
});
</script>
</body>
</html>
