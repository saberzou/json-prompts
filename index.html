<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>JSON Prompts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist/dist/fonts/geist-mono/style.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #000;
  --surface: #111;
  --text: #e8e8e8;
  --text-dim: #555;
  --accent: #ff6b35;
  --mono: 'Geist Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --display: 'Pixelify Sans', cursive;
  --cell: 220px;
  --gap: 1px;
  --gap-color: rgba(255,255,255,0.10);
}

html, body {
  background: var(--bg);
  font-family: var(--sans);
  color: var(--text);
  height: 100%; width: 100%;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  touch-action: none;
  user-select: none;
}

/* ========== NAV ========== */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 24px; pointer-events: none;
}
nav > * { pointer-events: auto; }

.logo {
  font-family: var(--display); font-size: 14px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text); text-decoration: none;
}
.logo span { color: var(--accent); }

.nav-btn {
  width: 40px; height: 40px; border-radius: 50%;
  border: 1.5px solid #333; background: rgba(0,0,0,0.7);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  color: var(--text); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s;
}
.nav-btn:hover { border-color: #666; }
.nav-btn svg { width: 16px; height: 16px; }

/* ========== FOOTER ========== */
.footer-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 24px; pointer-events: none;
}
.footer-bar > * { pointer-events: auto; }

.counter {
  font-family: var(--mono); font-size: 13px;
  color: var(--text-dim);
}

.pill-btn {
  width: 40px; height: 40px; border-radius: 50%;
  border: 1.5px solid #333; background: rgba(0,0,0,0.7);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  color: var(--text); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s;
}
.pill-btn:hover { border-color: #666; }
.pill-btn svg { width: 18px; height: 18px; }

/* ========== INFINITE GRID ========== */
#gridViewport {
  position: fixed; inset: 0;
  overflow: hidden;
  cursor: grab;
  background: var(--gap-color);
}
#gridViewport:active { cursor: grabbing; }

#gridCanvas {
  position: absolute; top: 0; left: 0;
  display: flex; flex-wrap: wrap;
  will-change: transform;
}

/* One tile block — an 8-col grid of 32 items */
.tile-block {
  display: grid;
  grid-template-columns: repeat(8, var(--cell));
  grid-auto-rows: var(--cell);
  grid-auto-flow: dense;
  gap: var(--gap);
  background: var(--gap-color);
}

.tile-block .item {
  position: relative; overflow: hidden;
  background: var(--bg); cursor: pointer;
}
.tile-block .item img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  transition: transform 0.4s cubic-bezier(0.25,0,0.25,1);
}
.tile-block .item:hover img { transform: scale(1.05); }

/* Size variants */
.item.sq { grid-column: span 1; grid-row: span 1; }
.item.landscape { grid-column: span 2; grid-row: span 1; }
.item.portrait { grid-column: span 1; grid-row: span 2; }

/* Hover overlay */
.item::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 50%);
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.item:hover::after { opacity: 1; }

.item .item-title {
  position: absolute; bottom: 8px; left: 10px; right: 10px;
  font-size: 11px; font-weight: 500; color: #fff;
  opacity: 0; transform: translateY(4px);
  transition: opacity 0.3s, transform 0.3s;
  z-index: 2; pointer-events: none;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.item:hover .item-title { opacity: 1; transform: translateY(0); }

/* ========== LIST VIEW ========== */
#listView {
  display: none;
  position: fixed; inset: 0;
  overflow: hidden;
  background: var(--bg);
}

.list-item {
  position: absolute;
  left: 50%; top: 50%;
  width: 55vw; max-width: 480px;
  aspect-ratio: 1;
  overflow: hidden; cursor: pointer;
  background: var(--surface);
  transition: transform 0.5s cubic-bezier(0.25,0,0.25,1),
              opacity 0.5s cubic-bezier(0.25,0,0.25,1);
  will-change: transform, opacity;
  transform-origin: center center;
}
.list-item img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}

.list-item .list-title {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 40px 16px 16px;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
  font-size: 15px; font-weight: 500; color: #fff;
  opacity: 0; transition: opacity 0.3s;
}
.list-item.active .list-title { opacity: 1; }

.list-item .list-model {
  position: absolute; bottom: 12px; left: 16px;
  font-family: var(--mono); font-size: 11px;
  color: rgba(255,255,255,0.5);
  opacity: 0; transition: opacity 0.3s;
}
.list-item.active .list-model { opacity: 1; }

/* ========== MODAL ========== */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.88);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }

.modal {
  position: relative;
  width: 90%; max-width: 540px; max-height: 85vh;
  overflow-y: auto; background: #0a0a0a;
  border: 1px solid #1a1a1a; border-radius: 12px;
  transform: translateY(20px) scale(0.97); transition: transform 0.3s;
}
.modal-overlay.active .modal { transform: translateY(0) scale(1); }

.modal-image { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
.modal-body { padding: 20px; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.modal-model { font-family: var(--mono); font-size: 12px; color: var(--text-dim); margin-bottom: 16px; }
.modal-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.tag {
  font-family: var(--mono); font-size: 11px; color: var(--accent);
  border: 1px solid rgba(255,107,53,0.25); padding: 3px 8px; border-radius: 4px;
}

.json-block {
  position: relative; background: #050505;
  border: 1px solid #1a1a1a; border-radius: 8px; padding: 16px; overflow-x: auto;
}
.json-block pre {
  font-family: var(--mono); font-size: 12px; line-height: 1.6;
  color: #aaa; white-space: pre-wrap; word-break: break-word;
}

.copy-btn {
  position: absolute; top: 8px; right: 8px;
  font-family: var(--mono); font-size: 11px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 4px; padding: 5px 12px;
  cursor: pointer; transition: background 0.2s, transform 0.1s;
}
.copy-btn:hover { background: #e55a28; }
.copy-btn:active { transform: scale(0.95); }
.copy-btn.copied { background: #2a9d4a; }

.modal-source {
  display: inline-block; margin-top: 12px;
  font-family: var(--mono); font-size: 11px;
  color: var(--text-dim); text-decoration: none;
  border-bottom: 1px solid #222; transition: color 0.2s;
}
.modal-source:hover { color: var(--text); }

.modal-close {
  position: absolute; top: 12px; right: 12px;
  width: 32px; height: 32px; border-radius: 50%; border: none;
  background: rgba(0,0,0,0.5); color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 10; font-size: 18px; transition: background 0.2s;
}
.modal-close:hover { background: rgba(0,0,0,0.7); }

/* ========== ABOUT ========== */
.about-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.92);
  backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.about-overlay.active { opacity: 1; pointer-events: auto; }
.about-content { max-width: 440px; padding: 40px 24px; text-align: center; }
.about-title { font-family: var(--display); font-size: 28px; letter-spacing: 0.05em; margin-bottom: 8px; }
.about-title span { color: var(--accent); }
.about-tagline { font-size: 14px; color: var(--text-dim); margin-bottom: 32px; line-height: 1.6; }
.about-text { font-size: 14px; line-height: 1.8; color: #777; margin-bottom: 24px; }
.about-close {
  font-family: var(--mono); font-size: 12px; color: var(--text-dim);
  background: none; border: 1px solid #333; border-radius: 20px;
  padding: 8px 24px; cursor: pointer; transition: border-color 0.2s, color 0.2s;
}
.about-close:hover { border-color: #555; color: var(--text); }

/* ========== RESPONSIVE ========== */
@media (max-width: 480px) {
  :root { --cell: 160px; }
  .list-item { width: 75vw; }
}
@media (min-width: 1200px) {
  :root { --cell: 280px; }
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
</style>
</head>
<body>

<nav>
  <a href="#" class="logo" id="homeBtn"><span>JSON</span> Prompts</a>
  <button class="nav-btn" id="aboutBtn" aria-label="About">
    <i data-lucide="info" style="width:16px;height:16px"></i>
  </button>
</nav>

<!-- GRID -->
<div id="gridViewport">
  <div id="gridCanvas"></div>
</div>

<!-- LIST -->
<div id="listView"></div>

<!-- FOOTER -->
<div class="footer-bar">
  <div class="counter" id="counter"></div>
  <button class="pill-btn" id="viewToggle" aria-label="Toggle view">
    <i data-lucide="rows-3" id="listIcon" style="width:18px;height:18px"></i>
    <i data-lucide="grid-2x2" id="gridIcon" style="width:18px;height:18px;display:none"></i>
  </button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">×</button>
    <img class="modal-image" id="modalImage" src="" alt="">
    <div class="modal-body">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-model" id="modalModel"></div>
      <div class="modal-tags" id="modalTags"></div>
      <div class="json-block">
        <button class="copy-btn" id="copyBtn">COPY</button>
        <pre id="modalJson"></pre>
      </div>
      <a class="modal-source" id="modalSource" href="#" target="_blank" rel="noopener">Source ↗</a>
    </div>
  </div>
</div>

<!-- ABOUT -->
<div class="about-overlay" id="aboutOverlay">
  <div class="about-content">
    <div class="about-title"><span>JSON</span> Prompts</div>
    <div class="about-tagline">Curated image generation prompts you can steal.</div>
    <p class="about-text">
      A collection of vivid, precise prompts that produce remarkable images.
      Browse the gallery, find one you like, copy the JSON, and make it yours.
    </p>
    <button class="about-close" id="aboutClose">Close</button>
  </div>
</div>

<script>
lucide.createIcons();
let prompts = [];
let isGrid = true;
let listIndex = 0;

// Layout pattern for one tile block (matches ExtraOrdinary Things)
// 8 columns, items are: sq (1×1), landscape (2×1), portrait (1×2)
const tilePattern = [
  'sq','sq','landscape','sq','sq','sq','sq','landscape',
  'sq','sq','portrait','sq','sq','sq','portrait','sq',
  'sq','sq','sq','sq','portrait','sq','landscape','sq',
  'sq','sq','sq','sq','sq','landscape','sq','landscape',
];

fetch('prompts.json')
  .then(r => r.json())
  .then(data => { prompts = data; buildGrid(); });

/* ============ INFINITE PAN GRID ============ */
const gridViewport = document.getElementById('gridViewport');
const gridCanvas = document.getElementById('gridCanvas');

let tileW = 0, tileH = 0;
let panX = 0, panY = 0;

function buildGrid() {
  // Build one tile block HTML
  const blockHTML = buildTileBlockHTML();

  // Create 3×3 = 9 copies for seamless wrapping
  gridCanvas.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const block = document.createElement('div');
    block.className = 'tile-block';
    block.innerHTML = blockHTML;
    gridCanvas.appendChild(block);
  }

  // Measure one block
  requestAnimationFrame(() => {
    const firstBlock = gridCanvas.querySelector('.tile-block');
    tileW = firstBlock.offsetWidth;
    tileH = firstBlock.offsetHeight;

    // Arrange 3×3
    gridCanvas.style.width = (tileW * 3 + 2) + 'px';
    gridCanvas.style.display = 'flex';
    gridCanvas.style.flexWrap = 'wrap';

    // Center the middle tile in viewport
    panX = -(tileW - window.innerWidth / 2 + tileW / 2);
    panY = -(tileH - window.innerHeight / 2 + tileH / 2);
    applyPan();
  });

  updateCounter();
}

function buildTileBlockHTML() {
  // Fill 32 slots with prompts, ensuring no two adjacent cells use the same prompt.
  // "Adjacent" = previous slot AND the slot 8 positions back (same column, row above).
  const n = prompts.length;
  const slots = [];
  for (let i = 0; i < tilePattern.length; i++) {
    // Collect indices that would be adjacent
    const avoid = new Set();
    if (i > 0) avoid.add(slots[i - 1]);           // left neighbor
    if (i >= 8) avoid.add(slots[i - 8]);           // top neighbor (same col)
    if (i >= 7) avoid.add(slots[i - 7]);           // top-right diagonal
    if (i >= 9) avoid.add(slots[i - 9]);           // top-left diagonal

    // Pick a random index that isn't in the avoid set
    let candidates = [];
    for (let j = 0; j < n; j++) {
      if (!avoid.has(j)) candidates.push(j);
    }
    // Fallback: if all are avoided (tiny prompt count), allow any
    if (candidates.length === 0) {
      candidates = Array.from({ length: n }, (_, j) => j);
    }
    slots.push(candidates[Math.floor(Math.random() * candidates.length)]);
  }

  let html = '';
  slots.forEach((idx, i) => {
    const p = prompts[idx];
    const type = tilePattern[i];
    html += `<div class="item ${type}" data-idx="${idx}">
      <img src="${p.image}" alt="${p.title}" loading="lazy">
      <span class="item-title">${p.title}</span>
    </div>`;
  });
  return html;
}

function applyPan() {
  // Wrap around so we never run out of canvas
  if (tileW > 0) {
    // Normalize panX into [-tileW, 0] range
    panX = ((panX % tileW) + tileW) % tileW - tileW;
    panY = ((panY % tileH) + tileH) % tileH - tileH;
  }
  gridCanvas.style.transform = `translate3d(${panX}px, ${panY}px, 0)`;
}

// --- Drag / pan with inertia ---
let isDragging = false;
let dragStartX, dragStartY, dragPanStartX, dragPanStartY;
let dragMoved = false;
let velX = 0, velY = 0;
let lastMoveX = 0, lastMoveY = 0, lastMoveTime = 0;
let inertiaRAF = null;

gridViewport.addEventListener('pointerdown', (e) => {
  if (e.target.closest('button, a, .modal-overlay, .about-overlay')) return;
  isDragging = true;
  dragMoved = false;
  velX = 0; velY = 0;
  if (inertiaRAF) { cancelAnimationFrame(inertiaRAF); inertiaRAF = null; }
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  lastMoveX = e.clientX;
  lastMoveY = e.clientY;
  lastMoveTime = performance.now();
  dragPanStartX = panX;
  dragPanStartY = panY;
  gridViewport.setPointerCapture(e.pointerId);
});

window.addEventListener('pointermove', (e) => {
  if (!isDragging) return;
  const now = performance.now();
  const dt = now - lastMoveTime;
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;
  if (dt > 0) {
    velX = (e.clientX - lastMoveX) / dt * 16; // px per frame (~16ms)
    velY = (e.clientY - lastMoveY) / dt * 16;
  }
  lastMoveX = e.clientX;
  lastMoveY = e.clientY;
  lastMoveTime = now;
  panX = dragPanStartX + dx;
  panY = dragPanStartY + dy;
  applyPan();
});

window.addEventListener('pointerup', () => {
  if (!isDragging) return;
  isDragging = false;
  // Kick off inertia if velocity is meaningful
  if (Math.abs(velX) > 0.5 || Math.abs(velY) > 0.5) {
    startInertia();
  }
});

function startInertia() {
  const friction = 0.94;
  function tick() {
    velX *= friction;
    velY *= friction;
    if (Math.abs(velX) < 0.1 && Math.abs(velY) < 0.1) { inertiaRAF = null; return; }
    panX += velX;
    panY += velY;
    applyPan();
    inertiaRAF = requestAnimationFrame(tick);
  }
  inertiaRAF = requestAnimationFrame(tick);
}

// Click on item (only if not dragged)
gridCanvas.addEventListener('click', (e) => {
  if (dragMoved) return;
  const item = e.target.closest('.item');
  if (!item) return;
  const idx = parseInt(item.dataset.idx);
  if (prompts[idx]) openModal(prompts[idx]);
});

// Mouse wheel pan
gridViewport.addEventListener('wheel', (e) => {
  e.preventDefault();
  panX -= e.deltaX || 0;
  panY -= e.deltaY || 0;
  applyPan();
}, { passive: false });

/* ============ LIST VIEW ============ */
const listView = document.getElementById('listView');
let listScrollLocked = false;

function renderList() {
  listView.innerHTML = '';
  listIndex = 0;

  prompts.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'list-item';
    item.dataset.idx = i;
    item.innerHTML = `
      <img src="${p.image}" alt="${p.title}">
      <div class="list-title">${p.title}</div>
    `;
    item.addEventListener('click', () => openModal(p));
    listView.appendChild(item);
  });

  positionListItems();
}

function positionListItems() {
  const items = listView.querySelectorAll('.list-item');
  const vh = window.innerHeight;

  items.forEach((item, i) => {
    const offset = i - listIndex;
    item.classList.toggle('active', offset === 0);

    const itemW = Math.min(window.innerWidth * 0.55, 480);

    if (offset === 0) {
      item.style.transform = `translate(-50%, -50%) scale(1)`;
      item.style.opacity = '1';
      item.style.zIndex = '10';
    } else if (Math.abs(offset) === 1) {
      const y = offset * vh * 0.38;
      item.style.transform = `translate(-50%, calc(-50% + ${y}px)) scale(0.55)`;
      item.style.opacity = '0.45';
      item.style.zIndex = '5';
    } else if (Math.abs(offset) === 2) {
      const y = offset * vh * 0.55;
      item.style.transform = `translate(-50%, calc(-50% + ${y}px)) scale(0.35)`;
      item.style.opacity = '0.15';
      item.style.zIndex = '2';
    } else {
      item.style.transform = `translate(-50%, calc(-50% + ${offset * vh}px)) scale(0.2)`;
      item.style.opacity = '0';
      item.style.zIndex = '0';
    }
  });

  document.getElementById('counter').textContent = `${listIndex + 1} / ${prompts.length}`;
}

function listNav(dir) {
  if (listScrollLocked) return;
  const next = listIndex + dir;
  if (next < 0 || next >= prompts.length) return;
  listScrollLocked = true;
  listIndex = next;
  positionListItems();
  setTimeout(() => { listScrollLocked = false; }, 500);
}

// List scroll/swipe
let listTouchY = 0;
window.addEventListener('wheel', (e) => {
  if (isGrid || modalOverlay.classList.contains('active')) return;
  e.preventDefault();
  listNav(e.deltaY > 0 ? 1 : -1);
}, { passive: false });

window.addEventListener('touchstart', (e) => {
  if (isGrid) return;
  listTouchY = e.touches[0].clientY;
}, { passive: true });

window.addEventListener('touchend', (e) => {
  if (isGrid) return;
  const dy = listTouchY - e.changedTouches[0].clientY;
  if (Math.abs(dy) > 40) listNav(dy > 0 ? 1 : -1);
});

window.addEventListener('keydown', (e) => {
  if (isGrid || modalOverlay.classList.contains('active')) return;
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') listNav(1);
  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') listNav(-1);
});

window.addEventListener('resize', () => { if (!isGrid) positionListItems(); });

/* ============ VIEW TOGGLE ============ */
const listIcon = document.getElementById('listIcon');
const gridIcon = document.getElementById('gridIcon');

document.getElementById('viewToggle').addEventListener('click', () => {
  isGrid = !isGrid;
  listIcon.style.display = isGrid ? 'block' : 'none';
  gridIcon.style.display = isGrid ? 'none' : 'block';

  if (isGrid) {
    gridViewport.style.display = '';
    listView.style.display = 'none';
    updateCounter();
  } else {
    gridViewport.style.display = 'none';
    listView.style.display = 'block';
    renderList();
  }
});

function updateCounter() {
  document.getElementById('counter').textContent =
    `${prompts.length} prompt${prompts.length !== 1 ? 's' : ''}`;
}

/* ============ MODAL ============ */
const modalOverlay = document.getElementById('modalOverlay');

function openModal(p) {
  document.getElementById('modalImage').src = p.image;
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalModel').textContent = p.model;
  document.getElementById('modalTags').innerHTML =
    (p.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
  document.getElementById('modalJson').textContent = JSON.stringify(p.prompt, null, 2);

  const src = document.getElementById('modalSource');
  src.style.display = p.source ? 'inline-block' : 'none';
  if (p.source) src.href = p.source;

  const cb = document.getElementById('copyBtn');
  cb.textContent = 'COPY'; cb.classList.remove('copied');
  modalOverlay.classList.add('active');
}

function closeModal() { modalOverlay.classList.remove('active'); }

document.getElementById('modalClose').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });

document.getElementById('copyBtn').addEventListener('click', () => {
  const json = document.getElementById('modalJson').textContent;
  navigator.clipboard.writeText(json).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'COPIED'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 2000);
  });
});

/* ============ ABOUT ============ */
const aboutOverlay = document.getElementById('aboutOverlay');
document.getElementById('aboutBtn').addEventListener('click', () => aboutOverlay.classList.add('active'));
document.getElementById('aboutClose').addEventListener('click', () => aboutOverlay.classList.remove('active'));
aboutOverlay.addEventListener('click', (e) => { if (e.target === aboutOverlay) aboutOverlay.classList.remove('active'); });

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeModal(); aboutOverlay.classList.remove('active'); }
});

document.getElementById('homeBtn').addEventListener('click', (e) => {
  e.preventDefault();
  if (!isGrid) { listIndex = 0; positionListItems(); }
});
</script>
</body>
</html>
